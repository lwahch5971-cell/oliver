<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوليفر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
}

body {
  font-family: 'Noto Naskh Arabic', serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Particles canvas */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Stage */
#stage {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem;
}

/* All text lines */
.line {
  text-align: center;
  opacity: 0;
  color: #fff;
  position: absolute;
  width: 100%;
  left: 0;
  transition: opacity 1.4s ease;
}

#line-date {
  font-size: clamp(15px, 3vw, 22px);
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.06em;
  line-height: 2;
  top: calc(50% - 80px);
}

#line-name {
  font-size: clamp(48px, 11vw, 96px);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.02em;
  line-height: 1;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0;
  text-shadow:
    0 0 120px rgba(255,255,255,0.08),
    0 2px 0 rgba(255,255,255,0.04);
}

#line-sub {
  font-size: clamp(13px, 2.2vw, 18px);
  font-weight: 400;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.18em;
  top: calc(50% + 80px);
}

#line-end {
  font-size: clamp(11px, 1.8vw, 14px);
  font-weight: 400;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.22em;
  line-height: 2.8;
  top: calc(50% + 60px);
}

#line-thanks {
  font-size: clamp(13px, 2vw, 16px);
  font-weight: 400;
  color: rgba(255,255,255,0.32);
  letter-spacing: 0.14em;
  top: 50%;
  transform: translateY(-50%);
}

/* Final black overlay */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 3s ease;
}
#overlay.black { opacity: 1; }

/* Hairline — appears before name */
#hairline {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: calc(50% - 10px);
  width: 0;
  height: 1px;
  background: rgba(255,255,255,0.12);
  transition: width 2s ease;
  z-index: 0;
}
#hairline.expand { width: min(320px, 55vw); }

/* Breath dot — pulses slowly in first 8s */
#breath {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  z-index: 2;
  animation: breathe 3.5s ease-in-out infinite;
  opacity: 0;
  transition: opacity 1s;
}
@keyframes breathe {
  0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.12; }
  50% { transform: translate(-50%,-50%) scale(2.5); opacity: 0.25; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="stage">
  <div id="hairline"></div>
  <div id="line-date" class="line"></div>
  <div id="line-name" class="line">مات أوليفر.</div>
  <div id="line-sub" class="line"></div>
  <div id="line-end" class="line"></div>
  <div id="line-thanks" class="line"></div>
</div>

<div id="breath"></div>
<div id="overlay"></div>

<script>
// ── Particles (ash / snow) ──────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); spawnParticles(); });

function spawnParticles() {
  pts = [];
  const n = Math.floor((W * H) / 14000);
  for (let i = 0; i < n; i++) pts.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.1 + 0.2,
    vx: (Math.random() - 0.5) * 0.22,
    vy: (Math.random() - 0.5) * 0.14,
    a: Math.random() * 0.18 + 0.03,
  });
}
spawnParticles();

let particleAlpha = 0, targetAlpha = 0;
function drawParticles() {
  particleAlpha += (targetAlpha - particleAlpha) * 0.025;
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,200,195,${p.a * particleAlpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Helpers ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const show = (id, opacity=1, dur) => {
  const el = $(id);
  if (dur !== undefined) el.style.transition = `opacity ${dur}s ease`;
  el.style.opacity = opacity;
};
const hide = (id, dur) => show(id, 0, dur);

const timers = [];
const at = (ms, fn) => timers.push(setTimeout(fn, ms));

// ── Flicker name in ──────────────────────────────────────────────
function flickerName() {
  const el = $('line-name');
  el.style.transition = 'opacity 0.05s';
  let i = 0, seq = [0,1,0,0.6,0,1,0.4,1];
  function step() {
    if (i >= seq.length) { el.style.opacity = 1; return; }
    el.style.opacity = seq[i++];
    setTimeout(step, 55 + Math.random()*40);
  }
  step();
}

// ── Audio fade ───────────────────────────────────────────────────
const audio = $('audio');
function fadeAudio(to, ms) {
  const from = audio.volume, steps = 30, dt = ms/steps;
  let i = 0;
  const iv = setInterval(() => {
    i++;
    audio.volume = Math.max(0, Math.min(1, from + (to - from) * (i/steps)));
    if (i >= steps) clearInterval(iv);
  }, dt);
}

// ── Main sequence ────────────────────────────────────────────────
function run() {
  audio.volume = 0;
  audio.play().catch(()=>{});
  fadeAudio(1, 3000);

  // Breath dot visible during silence
  at(300,  () => { $('breath').style.opacity = 1; targetAlpha = 1; });

  // 8s — breath fades, date appears
  at(8000, () => {
    $('breath').style.opacity = 0;
    $('line-date').textContent = 'في السابع من شهر مايو سنة ألفين وثلاثمئة وواحد وأربعين...';
    show('line-date');
  });

  // 11s — music dips 200ms, date fades, name flickers in
  at(11000, () => {
    fadeAudio(0.08, 200);
    setTimeout(() => fadeAudio(1, 400), 220);

    hide('line-date', 0.6);
    $('hairline').classList.add('expand');

    setTimeout(() => {
      flickerName();
    }, 300);
  });

  // 20s — date fully gone (already hidden), name remains alone
  // 24s — sub appears beneath name
  at(24000, () => {
    $('line-sub').textContent = 'انتهت الرحلة.';
    show('line-sub');
  });

  // 28s — music fades, name + sub + hairline fade out
  at(28000, () => {
    fadeAudio(0, 2800);
    hide('line-name', 2.5);
    hide('line-sub', 2);
    $('hairline').classList.remove('expand');
  });

  // 31s — end record
  at(31500, () => {
    $('line-end').innerHTML = 'انتهى السجل.&nbsp;&nbsp;تم إغلاق الملف.';
    show('line-end');
    targetAlpha = 0;
  });

  // 34.5s — hide end
  at(34500, () => hide('line-end', 1.2));

  // 36.5s — thanks
  at(36500, () => {
    $('line-thanks').textContent = 'شكراً لأنك رافقته حتى النهاية.';
    show('line-thanks');
  });

  // 38.5s — fade thanks
  at(38500, () => hide('line-thanks', 1.5));

  // 41s — black forever
  at(41000, () => $('overlay').classList.add('black'));
}

// Auto-start (works on most mobile browsers after user interaction via QR tap)
window.addEventListener('load', () => {
  // Try autoplay; if blocked show a tap-to-start overlay
  const tryStart = () => {
    audio.play()
      .then(() => { audio.pause(); audio.currentTime = 0; run(); })
      .catch(() => {
        const tap = document.createElement('div');
        tap.style.cssText = 'position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
        tap.innerHTML = '<span style="font-family:Noto Naskh Arabic,serif;color:rgba(255,255,255,0.35);font-size:14px;letter-spacing:0.2em;">اضغط للبدء</span>';
        document.body.appendChild(tap);
        tap.addEventListener('click', () => { tap.remove(); run(); }, {once:true});
      });
  };
  tryStart();
});
</script>
</body>
